<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemanticSentry | Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { margin: 0; color: #38bdf8; font-size: 28px; }
        .badge { background-color: #0284c7; padding: 5px 12px; border-radius: 15px; font-size: 14px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 20px; text-align: center; }
        .card h3 { margin: 0 0 10px 0; color: #94a3b8; font-size: 16px; }
        .card .number { font-size: 36px; font-weight: bold; margin: 0; }
        .text-blue { color: #38bdf8; } .text-red { color: #f43f5e; } .text-green { color: #10b981; }
        table { width: 100%; border-collapse: collapse; background-color: #1e293b; border-radius: 8px; overflow: hidden; border: 1px solid #334155; }
        th, td { padding: 14px 20px; text-align: left; }
        th { background-color: #0f172a; color: #94a3b8; font-weight: 600; border-bottom: 2px solid #334155; }
        tr { border-bottom: 1px solid #334155; }
        tr:last-child { border-bottom: none; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-pass { background-color: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-block { background-color: rgba(244, 63, 94, 0.2); color: #f43f5e; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SemanticSentry Dashboard</h1>
            <span class="badge">Zero-Trust Active</span>
        </header>

        <div class="grid">
            <div class="card">
                <h3>Total Intercepted Requests</h3>
                <p class="number text-blue" id="total-req">0</p>
            </div>
            <div class="card">
                <h3>Malicious Threats Blocked</h3>
                <p class="number text-red" id="blocked-req">0</p>
            </div>
            <div class="card">
                <h3>System Health Score</h3>
                <p class="number text-green">100%</p>
            </div>
        </div>

        <h2>Real-Time Security Inspection Logs</h2>
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>IP Address</th>
                    <th>Method</th>
                    <th>Target Path</th>
                    <th>Risk Score</th>
                    <th>Status Action</th>
                </tr>
            </thead>
            <tbody id="log-table-body">
                </tbody>
        </table>
    </div>

    <script>
        async function fetchLogs() {
            try {
                const response = await fetch('/api/security/logs');
                const logs = await response.json();
                
                const tableBody = document.getElementById('log-table-body');
                tableBody.innerHTML = '';
                
                let total = logs.length;
                let blocked = 0;

                logs.reverse().forEach(log => {
                    if(log.isBlocked) blocked++;
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${new Date(log.timestamp).toLocaleTimeString()}</td>
                        <td>${log.clientIp}</td>
                        <td><strong>${log.method}</strong></td>
                        <td><code>${log.targetPath}</code></td>
                        <td>${log.finalSuspicionScore.toFixed(2)}</td>
                        <td>
                            <span class="status-badge ${log.isBlocked ? 'status-block' : 'status-pass'}">
                                ${log.isBlocked ? 'BLOCKED' : 'PASSED'}
                            </span>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });

                document.getElementById('total-req').innerText = total;
                document.getElementById('blocked-req').innerText = blocked;
            } catch (err) {
                console.error("Error fetching dashboard analytics:", err);
            }
        }

        // Auto refresh analytics logs every 3 seconds
        fetchLogs();
        setInterval(fetchLogs, 3000);
    </script>
</body>
</html>
